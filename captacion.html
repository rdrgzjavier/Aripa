    <style>
        /* ══════════════════════════════════════════
           DESIGN SYSTEM (Sincronizado con index.html)
        ══════════════════════════════════════════ */
        :root {
            --color-primary:               220 80% 14%;
            --color-primary-container:     225 51% 23%;
            --color-secondary:             265 47% 51%;
            --color-secondary-container:   264 97% 74%;
            --color-on-primary-container:  224 34% 66%;
            --color-background:            20  33% 98%;
            --color-on-background:         180  2% 11%;
            
            /* Fondos específicos para captación */
            --color-bg-captacion:          220 80% 10%; /* Azul profundo pero no negro puro */
            --duration-base:    300ms;
            --ease-out-expo:    cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: hsl(var(--color-bg-captacion));
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header consistency with index.html ── */
        header { width: 100%; } /* Tailwind classes like 'fixed' and 'z-50' are applied via classes below */
        #site-header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            background-color: transparent;
            backdrop-filter: blur(0px);
            transition: all var(--duration-base) var(--ease-out-expo);
        }
        #site-header.is-sticky {
            background-color: rgba(6, 21, 66, 0.82);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 48px -18px rgba(0,0,0,0.45);
        }
        #site-header .header-inner {
            height: 4.25rem;
            transition: height var(--duration-base) var(--ease-out-expo);
        }
        @media (min-width: 768px) {
            #site-header .header-inner { height: 5rem; }
            #site-header.is-sticky .header-inner { height: 4.35rem; }
        }

        /* ── Design Tokens ── */
        .btn-after {
            background: linear-gradient(180deg, #8b5cf6 0%, #6c45c0 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 8px 16px -4px rgba(108,69,192,0.5);
            border: 1px solid rgba(139,92,246,0.5);
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-after:hover { transform: scale(1.02); }

        /* ── Aurora Background ── */
        .aurora-container {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -20%);
            width: 150vw;
            height: 90vh;
            z-index: -1;
            pointer-events: none;
        }
        .aurora-arc {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom center, hsl(var(--color-secondary)) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.35;
            border-radius: 50% 50% 0 0;
        }

        /* ── Main Content ── */
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 180px 1.5rem 80px;
            min-height: 100vh;
        }
        .glass-card {
            width: 100%;
            max-width: 580px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 5rem 3rem;
            text-align: center;
            box-shadow: 0 40px 120px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.8rem, 8vw, 4rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        p.subtle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 3.5rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Form Fixed Vertical Centering ── */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .input-group {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center; /* Vertical alignment for placeholder/text */
            height: 4rem;
            padding: 0 1.25rem;
            transition: border-color 0.3s;
        }
        .input-group:focus-within { border-color: hsl(var(--color-secondary)); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
            height: 100%;
            line-height: normal; /* Better placeholder centering */
        }
        input::placeholder { color: rgba(255, 255, 255, 0.25); }

        .btn-unirme {
            height: 4rem;
            border-radius: 20px;
            font-size: 0.9rem;
            width: 100%;
        }

        @media (min-width: 768px) {
            .form-container {
                flex-direction: row;
                background: rgba(0, 0, 0, 0.3);
                padding: 0.5rem;
                border-radius: 24px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                height: 5rem;
                gap: 0;
            }
            .input-group { background: transparent; border: none; height: 100%; flex: 1; }
            .btn-unirme { width: 180px; height: 100%; border-radius: 18px; }
        }

        /* ── Proof ── */
        .social-proof { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .avatars { display: flex; }
        .avatar {
            width: 34px;
            height: 34px;
            border: 2px solid hsl(var(--color-bg-captacion));
            border-radius: 50%;
            margin-left: -12px;
            background: #222;
        }
        .avatar:first-child { margin-left: 0; }
        .proof-text { font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); }

        /* ── Drawer consistency ── */
        .drawer-transition { transition: transform 300ms ease-in-out; }
    </style>

    <script>
        // Header & Drawer Logic (Sincronizada con index.html)
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('drawer-overlay');
            const content = document.getElementById('drawer-content');
            const isHidden = drawer.classList.contains('invisible');
            if (isHidden) {
                drawer.classList.remove('invisible');
                requestAnimationFrame(() => {
                    overlay.classList.add('opacity-100');
                    content.classList.remove('-translate-x-full');
                });
            } else {
                overlay.classList.remove('opacity-100');
                content.classList.add('-translate-x-full');
                setTimeout(() => drawer.classList.add('invisible'), 300);
            }
        }

        window.addEventListener('scroll', () => {
            const header = document.getElementById('site-header');
            if (window.scrollY > 20) header.classList.add('is-sticky');
            else header.classList.remove('is-sticky');
        });
    </script>
