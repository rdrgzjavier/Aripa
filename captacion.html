        p.subtle {

        /* ── Formulario & Input (Mejora Foco) ── */
        .form-container {

            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 3.5rem;

        .input-group {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            height: 4.2rem;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            transition: all 0.3s ease;
        }
        /* Propuesta de foco sin borde azul: Brillo interno sutil */
        .input-group:focus-within {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none !important;
            text-align: center;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.25); }

        /* CTA Unirme (Como el Hero de Index) */
        .btn-unirme {
            min-width: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.99) 0%, rgba(241, 236, 255, 0.95) 100%);
            color: #171443;
            border-radius: 12px;
            padding: 0 28px;
            height: 4.2rem;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.72);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 22px rgba(15, 8, 44, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-unirme:hover { transform: scale(1.02); }

        @media (min-width: 768px) {

        /* ── Social Proof ── */

        .avatar:first-child { margin-left: 0; }
        .proof-text { font-size: 0.85rem; color: rgba(255, 255, 255, 0.4); }

    <script>
        function toggleDrawer() {
            const dr = document.getElementById('drawer'), ov = document.getElementById('drawer-overlay'), co = document.getElementById('drawer-content');
            if (dr.classList.contains('invisible')) {
                dr.classList.remove('invisible');
                requestAnimationFrame(() => { ov.classList.add('opacity-100'); co.classList.remove('-translate-x-full'); });
            } else {
                ov.classList.remove('opacity-100'); co.classList.add('-translate-x-full');
                setTimeout(() => dr.classList.add('invisible'), 300);
            }
        }
        window.addEventListener('scroll', () => {
            const h = document.getElementById('site-header');
            if (window.scrollY > 20) h.classList.add('is-sticky'); else h.classList.remove('is-sticky');
        });
        (function () {
            const canvas = document.getElementById('hero-gradient-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d'), ORBS = [
                { color: [26, 42, 108], r: 1.06, ax: 0.30, ay: 0.22, px: 0.12, py: 0.16, speed: 0.0000037 },
                { color: [90, 50, 160], r: 1.00, ax: 0.27, ay: 0.34, px: 0.55, py: 0.22, speed: 0.0000028 },
                { color: [160, 80, 180], r: 0.96, ax: 0.22, ay: 0.38, px: 0.79, py: 0.58, speed: 0.0000022 },
                { color: [220, 95, 160], r: 0.90, ax: 0.35, ay: 0.24, px: 0.42, py: 0.76, speed: 0.0000031 }
            ];
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            resize(); window.addEventListener('resize', resize);
            const orbPos = (orb, t) => ({
                x: Math.max(0, Math.min(1, orb.px + orb.ax * Math.sin(t * orb.speed * 1000 + orb.color[0]))) * canvas.width,
                y: Math.max(0, Math.min(1, orb.py + orb.ay * Math.cos(t * orb.speed * 700 + orb.color[2]))) * canvas.height
            });
            const draw = (ts) => {
                const W = canvas.width, H = canvas.height; ctx.fillStyle = '#0e1240'; ctx.fillRect(0, 0, W, H); ctx.globalCompositeOperation = 'screen';
                for (const orb of ORBS) {
                    const p = orbPos(orb, ts), r = orb.r * Math.max(W, H), [cr, cg, cb] = orb.color;
                    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
                    g.addColorStop(0, `rgba(${cr},${cg},${cb},0.40)`); g.addColorStop(0.45, `rgba(${cr},${cg},${cb},0.14)`); g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
                    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
                }
                ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(draw);
            };
            requestAnimationFrame(draw);
        }());
    </script>
