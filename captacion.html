<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aripa | Únete a la lista</title>
    <meta name="description" content="Recibe estrategias exclusivas de SEO, CRO y Crecimiento Digital aplicadas con IA."/>

    <link rel="icon" href="/assets/favicon-32.png" sizes="32x32">
    <link rel="stylesheet" href="./style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg-captacion: #061542;
            --color-accent: #6c45c0;
        }

        body {
            background-color: var(--color-bg-captacion);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header Consistency (Index style but showing CTA on mobile) ── */
        #site-header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: transparent;
            transition: all 0.3s ease;
        }
        #site-header.is-sticky {
            background-color: rgba(6, 21, 66, 0.95);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 4.5rem;
            padding: 0 1.5rem;
            max-width: 1440px;
            margin: 0 auto;
            position: relative;
        }

        /* Burger ALWAYS on left for mobile */
        #hamburger-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Logo centered on mobile, left on desktop */
        .logo-wrap {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        @media (min-width: 768px) {
            .logo-wrap { position: static; transform: none; width: 25%; }
        }

        /* Mobile CTA (from screenshot) */
        .mobile-cta {
            display: flex;
            background: linear-gradient(180deg, #8b5cf6 0%, #6c45c0 100%);
            padding: 0.6rem 0.8rem;
            border-radius: 10px;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(108, 69, 192, 0.4);
            cursor: pointer;
            border: none;
            color: #fff;
        }
        .mobile-cta-text {
            font-size: 0.65rem;
            font-weight: 800;
            line-height: 1.1;
            text-align: left;
            text-transform: uppercase;
        }

        /* ── Main Wrapper Adjusted for ATL ── */
        .main-wrapper {
            display: flex;
            align-items: flex-start; /* Aligned top instead of center for ATL */
            justify-content: center;
            padding-top: 100px; /* Moar ATL */
            padding-bottom: 40px;
            min-height: 100vh;
        }

        .glass-card {
            width: 90%;
            max-width: 580px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 36px;
            padding: 3.5rem 2.5rem; /* Reduced padding for ATL */
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            margin-top: 2rem;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.4rem, 9vw, 3.8rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 1.2rem;
        }

        p.subtle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Form ── */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .input-group {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            height: 3.8rem;
            display: flex;
            align-items: center;
            padding: 0 1.2rem;
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            text-align: center;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.25); }

        .btn-unirme {
            height: 3.8rem;
            border-radius: 18px;
            width: 100%;
            font-size: 0.9rem !important;
            letter-spacing: 0.1em !important;
        }

        @media (min-width: 768px) {
            .main-wrapper { align-items: center; padding-top: 120px; }
            .form-container { flex-direction: row; background: rgba(0,0,0,0.25); padding: 0.5rem; border-radius: 22px; height: 4.8rem; gap: 0; }
            .input-group { background: transparent; border: none; flex: 1; height: 100%; }
            input { text-align: left; }
            .btn-unirme { width: 160px; height: 100%; border-radius: 16px; }
            .mobile-cta { display: none; }
        }

        /* ── Aurora Background ── */
        .aurora-container {
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -20%);
            width: 140vw;
            height: 80vh;
            z-index: -1;
            pointer-events: none;
        }
        .aurora-arc {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom center, var(--color-accent) 0%, transparent 65%);
            filter: blur(90px);
            opacity: 0.3;
            border-radius: 50% 50% 0 0;
        }

        /* ── Proof ── */
        .social-proof { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .avatars { display: flex; }
        .avatar { width: 30px; height: 30px; border: 2px solid var(--color-bg-captacion); border-radius: 50%; margin-left: -10px; background: #222; }
        .avatar:first-child { margin-left: 0; }
        .proof-text { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); font-weight: 500; }
    </style>
</head>
<body class="selection:bg-secondary/30">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-6104907020"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="aurora-container">
        <div class="aurora-arc"></div>
    </div>

    <!-- Header (Sincronizado y ajustado a screenshot mobile) -->
    <header id="site-header">
        <div class="header-inner">
            <!-- Burger -->
            <button id="hamburger-btn" onclick="toggleDrawer()" aria-label="Menu">
                <span class="material-symbols-outlined text-white text-2xl">menu</span>
            </button>

            <!-- Logo -->
            <div class="logo-wrap">
                <a href="index.html"><img src="./assets/aripa-logo.png" alt="aripa" height="18"></a>
            </div>

            <!-- Nav (Desktop only) -->
            <nav class="hidden md:flex gap-10">
                <a href="servicios.html" class="text-white/70 hover:text-white text-sm font-semibold">Servicios</a>
                <a href="recursos.html" class="text-white/70 hover:text-white text-sm font-semibold">Recursos</a>
            </nav>

            <!-- CTA (Desktop) -->
            <button class="hidden md:flex btn-after px-6 py-2.5 rounded-xl text-xs" onclick="window.location.href='index.html#contacto'">
                <span class="material-symbols-outlined text-sm mr-2">mail</span> TENGO UNA DUDA
            </button>

            <!-- CTA (Mobile - match screenshot) -->
            <button class="md:hidden mobile-cta" onclick="toggleDrawer()">
                <span class="material-symbols-outlined text-sm">mail</span>
                <div class="mobile-cta-text">TENGO<br/>UNA DUDA</div>
            </button>
        </div>
    </header>

    <!-- Drawer Mobile -->
    <div class="fixed inset-0 z-[110] invisible" id="drawer">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300" id="drawer-overlay"></div>
        <nav class="absolute left-0 top-0 h-full w-4/5 max-w-sm bg-[#061542] transition-transform duration-300 -translate-x-full p-8 flex flex-col" id="drawer-content">
            <div class="flex justify-between items-center mb-10">
                <img src="./assets/aripa-logo.png" alt="aripa" height="20">
                <button onclick="toggleDrawer()"><span class="material-symbols-outlined text-white">close</span></button>
            </div>
            <div class="flex flex-col gap-6">
                <a class="text-white text-lg font-medium" href="servicios.html">Servicios</a>
                <a class="text-white text-lg font-medium" href="recursos.html">Recursos</a>
                <button class="btn-after text-white py-4 rounded-xl font-bold uppercase text-xs" onclick="toggleDrawer()">Tengo una duda</button>
            </div>
        </nav>
    </div>

    <main class="main-wrapper">
        <section class="glass-card">
            <h1>Únete a la lista</h1>
            <p class="subtle">Recibe estrategias exclusivas de SEO, CRO y Crecimiento Digital aplicadas con IA directamente en tu bandeja.</p>

            <form class="form-container" onsubmit="event.preventDefault(); alert('¡Bienvenido!');">
                <div class="input-group">
                    <input type="email" placeholder="tu@empresa.com" required>
                </div>
                <button type="submit" class="btn-after btn-unirme">UNIRME</button>
            </form>

            <div class="social-proof">
                <div class="avatars">
                    <img src="https://i.pravatar.cc/100?u=a1" alt="u1" class="avatar">
                    <img src="https://i.pravatar.cc/100?u=a2" alt="u2" class="avatar">
                    <img src="https://i.pravatar.cc/100?u=a3" alt="u3" class="avatar">
                </div>
                <span class="proof-text">+2k personas impulsando sus negocios</span>
            </div>
        </section>
    </main>

    <script>
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('drawer-overlay');
            const content = document.getElementById('drawer-content');
            const isHidden = drawer.classList.contains('invisible');
            if (isHidden) {
                drawer.classList.remove('invisible');
                setTimeout(() => {
                    overlay.classList.add('opacity-100');
                    content.classList.remove('-translate-x-full');
                }, 10);
            } else {
                overlay.classList.remove('opacity-100');
                content.classList.add('-translate-x-full');
                setTimeout(() => drawer.classList.add('invisible'), 300);
            }
        }
        window.addEventListener('scroll', () => {
            const header = document.getElementById('site-header');
            if (window.scrollY > 20) header.classList.add('is-sticky');
            else header.classList.remove('is-sticky');
        });
    </script>
</body>
</html>
