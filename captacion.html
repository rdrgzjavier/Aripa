    <style>
        :root {
            --color-bg: #0a0b22; /* Ligeramente más claro como pidió el usuario */
            --color-accent: #6c45c0;
            --color-glow: rgba(124, 58, 237, 0.3);
        }

        body {
            background-color: var(--color-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Aurora Background ── */
        .aurora-container {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -20%);
            width: 150vw;
            height: 90vh;
            z-index: -1;
            pointer-events: none;
        }
        .aurora-arc {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom center, var(--color-accent) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.4;
            border-radius: 50% 50% 0 0;
        }

        /* ── Header overrides for dark context ── */
        #site-header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            transition: all 0.3s ease;
        }
        #site-header.is-sticky {
            background: rgba(6, 21, 66, 0.82);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* ── Card ── */
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 160px;
            padding-bottom: 80px;
            min-height: 100vh;
        }
        .glass-card {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 5rem 3.5rem;
            text-align: center;
            box-shadow: 0 40px 120px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3rem, 8vw, 4.5rem);
            font-weight: 400;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        p.subtle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 3.5rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Form Design System ── */
        .form-row {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
            transition: border-color 0.3s;
        }
        .form-row:focus-within { border-color: var(--color-accent); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 1.5rem;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            min-width: 0;
        }

        .social-proof {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 3.5rem;
        }
        .avatars { display: flex; }
        .avatar {
            width: 34px;
            height: 34px;
            border: 2px solid var(--color-bg);
            border-radius: 50%;
            margin-left: -12px;
            background: #1a1a1a;
            object-fit: cover;
        }
        .avatar:first-child { margin-left: 0; }
        .proof-text { font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); font-weight: 500; }

        @media (max-width: 640px) {
            .glass-card { padding: 4rem 2rem 3rem; }
            h1 { font-size: 2.8rem; }
            .form-row { flex-direction: column; padding: 0.75rem; }
            button { width: 100% !important; }
        }
    </style>
</head>
<body class="bg-[#0a0b22] selection:bg-secondary/30">

    <!-- Global Scripts -->
    <script>
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('drawer-overlay');
            const content = document.getElementById('drawer-content');
            const isHidden = drawer.classList.contains('invisible');
            if (isHidden) {
                drawer.classList.remove('invisible');
                overlay.classList.add('opacity-100');
                content.classList.remove('-translate-x-full');
                document.body.style.overflow = 'hidden';
            } else {
                overlay.classList.remove('opacity-100');
                content.classList.add('-translate-x-full');
                document.body.style.overflow = '';
                setTimeout(() => drawer.classList.add('invisible'), 300);
            }
        }
        window.addEventListener('scroll', () => {
            const header = document.getElementById('site-header');
            if (window.scrollY > 20) header.classList.add('is-sticky');
            else header.classList.remove('is-sticky');
        });
    </script>
