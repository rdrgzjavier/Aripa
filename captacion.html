<!DOCTYPE html>
<html class="scroll-smooth" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aripa | Lead Generation & Insights</title>
    <meta name="description" content="Únete a nuestra lista exclusiva para recibir estrategias reales de SEO, CRO y Crecimiento Digital."/>

    <link rel="icon" href="/assets/favicon-32.png" sizes="32x32">
    <link rel="stylesheet" href="./style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Petrona:ital,wght@1,400;1,700&family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #030617;
            --color-primary: #6c45c0;
            --color-glass: rgba(255, 255, 255, 0.03);
            --color-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--color-bg);
            color: #fcf9f8;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-petrona { font-family: 'Petrona', serif; font-style: italic; }

        .glass-card {
            background: var(--color-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--color-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(108, 69, 192, 0.15) 0%, rgba(108, 69, 192, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }

        .input-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-pill:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(108, 69, 192, 0.2);
            outline: none;
        }

        .btn-subscribe {
            background: linear-gradient(135deg, #8b5cf6 0%, #6c45c0 100%);
            box-shadow: 0 10px 20px -5px rgba(108, 69, 192, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-subscribe:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(108, 69, 192, 0.6);
        }

        .btn-subscribe:active {
            transform: translateY(0);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-reveal { animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-6104907020"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="grain"></div>
    <div class="blob top-0 right-0 -translate-y-1/2 translate-x-1/2"></div>
    <div class="blob bottom-0 left-0 translate-y-1/2 -translate-x-1/2"></div>

    <main class="w-full max-w-2xl text-center space-y-12">
        <!-- Logo -->
        <div class="flex justify-center animate-reveal">
            <a href="index.html">
                <img alt="aripa" class="h-6" src="./assets/aripa-logo.png" width="80" height="24"/>
            </a>
        </div>

        <!-- Hero Content -->
        <div class="space-y-6">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter leading-tight animate-reveal delay-1">
                El futuro del crecimiento,<br/>
                <span class="font-petrona text-white/70">directo a tu bandeja.</span>
            </h1>
            <p class="text-lg md:text-xl text-white/60 max-w-lg mx-auto leading-relaxed animate-reveal delay-2">
                Estrategias de SEO, CRO y Negocio Digital aplicadas con IA. Únete a la lista de espera de Aripa.
            </p>
        </div>

        <!-- Form Card -->
        <div class="glass-card p-8 md:p-12 rounded-3xl space-y-8 animate-reveal delay-3">
            <form id="lead-form" class="space-y-4" onsubmit="handleLeadSubmit(event)">
                <div class="space-y-4">
                    <input type="text" id="lead-name" placeholder="Tu nombre" required
                           class="w-full input-pill px-6 py-4 rounded-2xl text-white placeholder:text-white/20">
                    <input type="email" id="lead-email" placeholder="Email corporativo" required
                           class="w-full input-pill px-6 py-4 rounded-2xl text-white placeholder:text-white/20">
                </div>
                <button type="submit" class="w-full btn-subscribe py-5 rounded-2xl font-bold text-sm tracking-widest uppercase flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-base">send</span> Unirme a la lista
                </button>
            </form>
            <p class="text-[10px] text-white/30 uppercase tracking-widest">
                Prometemos valor real, sin spam. Puedes darte de baja en cualquier momento.
            </p>
        </div>

        <!-- Social Proof Lite -->
        <div class="pt-8 flex items-center justify-center gap-6 opacity-40 animate-reveal delay-3">
            <span class="text-xs font-bold tracking-widest uppercase">Estrategia</span>
            <span class="w-1 h-1 bg-white/20 rounded-full"></span>
            <span class="text-xs font-bold tracking-widest uppercase">Datos</span>
            <span class="w-1 h-1 bg-white/20 rounded-full"></span>
            <span class="text-xs font-bold tracking-widest uppercase">Crecimiento</span>
        </div>
    </main>

    <script>
        function handleLeadSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('lead-name').value;
            const email = document.getElementById('lead-email').value;
            
            // Simulación de envío a Brevo (placeholder)
            console.log('Lead Capturado:', { name, email });
            
            // Feedback visual
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined text-base">done</span> ¡Bienvenido!';
            btn.classList.replace('btn-subscribe', 'bg-green-500/20');
            btn.disabled = true;

            alert('¡Gracias ' + name + '! Te hemos añadido a la lista.');
        }
    </script>
</body>
</html>
