    <style>
        :root {
            --color-bg: #03040a;
            --color-accent: #5e3ab3;
            --color-glow: #7c3aed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--color-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            justify-content: center;
        }

        /* ── Aurora Background ── */
        .aurora-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -10%);
            width: 140vw;
            height: 80vh;
            z-index: -1;
            pointer-events: none;
        }

        .aurora-arc {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom center, var(--color-accent) 0%, transparent 60%);
            filter: blur(80px);
            opacity: 0.6;
            border-radius: 50% 50% 0 0;
        }

        .aurora-line {
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
            box-shadow: 0 0 40px 10px var(--color-glow);
            opacity: 0.2;
        }

        /* ── Header ── */
        header {
            position: fixed;
            top: 2rem;
            z-index: 100;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            padding: 0.5rem 1rem 0.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #fff; }

        /* ── Card ── */
        .glass-card {
            width: 90%;
            max-width: 580px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 5rem 3rem;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.8rem, 8vw, 4rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        p.subtle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Form ── */
        .form-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-container:focus-within { 
            border-color: rgba(255, 255, 255, 0.2); 
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 1.5rem;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            min-width: 0;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.25); }

        button {
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            padding: 0.9rem 1.6rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
            white-space: nowrap;
        }
        button:hover { 
            transform: translateY(-1px); 
            box-shadow: 0 12px 24px rgba(124, 58, 237, 0.4);
        }
        button:active { transform: translateY(0); }

        /* ── Social Proof ── */
        .social-proof {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 3rem;
        }
        .avatars { display: flex; }
        .avatar {
            width: 32px;
            height: 32px;
            border: 2px solid #03040a;
            border-radius: 50%;
            margin-left: -10px;
            background: #1a1a1a;
            object-fit: cover;
        }
        .avatar:first-child { margin-left: 0; }

        .proof-text { font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); font-weight: 500; }

        /* ── Stats Loop (Countdown Style) ── */
        .stats {
            display: grid;
            grid-template-cols: repeat(4, 1fr);
            gap: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 2.5rem;
        }
        .stat-item { display: flex; flex-direction: column; gap: 6px; }
        .stat-val { font-size: 1.6rem; font-weight: 600; font-variant-numeric: tabular-nums; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.1em; font-weight: 700; }

        @media (max-width: 640px) {
            header { top: 1rem; transform: scale(0.9); }
            .glass-card { padding: 4rem 1.5rem 3rem; border-radius: 32px; }
            h1 { font-size: 2.6rem; }
            .form-container { flex-direction: column; padding: 0.6rem; }
            button { width: 100%; padding: 1.1rem; }
            .stats { gap: 0.5rem; }
            .stat-val { font-size: 1.2rem; }
        }
    </style>
</head>

        </form>

        <div class="social-proof">

                <img src="https://i.pravatar.cc/100?u=a1" alt="user" class="avatar">

                <img src="https://i.pravatar.cc/100?u=a3" alt="user" class="avatar">
            </div>
            <span class="proof-text">~ +2k personas ya se han unido</span>
        </div>

        <div class="stats">
            <div class="stat-item"><span class="stat-val">4</span><span class="stat-label">Días</span></div>
            <div class="stat-item"><span class="stat-val">11</span><span class="stat-label">Horas</span></div>
            <div class="stat-item"><span class="stat-val">46</span><span class="stat-label">Minutos</span></div>
            <div class="stat-item"><span class="stat-val">31</span><span class="stat-label">Segundos</span></div>
        </div>
    </main>

</body>
