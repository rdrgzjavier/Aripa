<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aripa — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script type="text/javascript">
    (function (C, A, L) {
      let p = function (a, ar) { a.q.push(ar); };
      let d = C.document;
      C.Cal = C.Cal || function () {
        let cal = C.Cal; let ar = arguments;
        if (!cal.loaded) {
          cal.ns = {}; cal.q = cal.q || [];
          d.head.appendChild(d.createElement("script")).src = A;
          cal.loaded = true;
        }
        if (ar[0] === L) {
          const api = function () { p(api, arguments); };
          const namespace = ar[1]; api.q = api.q || [];
          if (typeof namespace === "string") { cal.ns[namespace] = api; p(api, ar); p(cal, ["initNamespace", namespace]); }
          else p(cal, ar); return;
        }
        p(cal, ar);
      };
    })(window, "https://app.cal.com/embed/embed.js", "init");
    Cal("init", "aripa", { origin: "https://cal.com" });
    Cal.ns.aripa("ui", { hideEventTypeDetails: false, layout: "month_view" });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Plus Jakarta Sans', sans-serif;
      --white: #ffffff;
      /* Border radius igual que el site actual */
      --btn-radius: 12px;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      overflow-x: hidden;
    }

    /* ── HERO: 85svh en vez de 100svh ── */
    .hero {
      position: relative;
      height: 85svh;
      min-height: 540px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #gradient-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.055'/%3E%3C/svg%3E");
      background-size: 200px;
      mix-blend-mode: overlay;
      opacity: 0.55;
    }

    /* ── NAV ── */
    nav {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      flex-shrink: 0;
    }

    .nav-logo img {
      height: 30px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    .nav-cta {
      background: rgba(255,255,255,0.20);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: 100px;
      padding: 9px 22px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: background 0.2s, transform 0.2s;
    }
    .nav-cta:hover { background: rgba(255,255,255,0.30); transform: translateY(-1px); }

    /* Hamburguesa mobile */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: 10px;
      cursor: pointer;
      padding: 8px;
      backdrop-filter: blur(12px);
      transition: background 0.2s;
    }
    .nav-hamburger:hover { background: rgba(255,255,255,0.25); }
    .nav-hamburger span {
      display: block;
      height: 1.5px;
      background: white;
      border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
      transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .nav-menu {
      display: none;
      position: absolute;
      top: calc(100% - 8px);
      right: 20px;
      background: rgba(20,16,50,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 8px;
      min-width: 180px;
      z-index: 30;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .nav-menu.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .nav-menu a,
    .nav-menu button {
      display: block; width: 100%; text-align: left;
      padding: 11px 16px; color: rgba(255,255,255,0.88);
      font-family: var(--font); font-size: 0.88rem; font-weight: 500;
      background: none; border: none; border-radius: 10px;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .nav-menu a:hover,
    .nav-menu button:hover { background: rgba(255,255,255,0.10); color: white; }
    .nav-menu .menu-divider { height: 1px; background: rgba(255,255,255,0.10); margin: 4px 8px; }
    .nav-menu .menu-cta { color: white; font-weight: 700; background: rgba(255,255,255,0.12); margin-top: 2px; }
    .nav-menu .menu-cta:hover { background: rgba(255,255,255,0.22); }

    /* ── HERO CONTENT: centrado dentro de los 85svh ── */
    .hero-content {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px 32px;
      gap: 0;
    }

    /* ── SOCIAL PROOF ── */
    .social-proof {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 16px;
      padding: 10px 16px 10px 10px;
      margin-bottom: 26px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      animation: fadeUp 0.6s 0.1s ease both;
      width: fit-content;
      max-width: min(360px, calc(100vw - 48px));
    }

    .sp-avatars { display: flex; flex-shrink: 0; }
    .sp-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.75);
      margin-left: -13px; overflow: hidden; flex-shrink: 0;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sp-avatar:first-child { margin-left: 0; }
    .sp-avatar:nth-child(1) { background: #c8956c; }
    .sp-avatar:nth-child(2) { background: #a0744a; }
    .sp-avatar:nth-child(3) { background: #e0b48a; }
    .sp-avatar:nth-child(4) { background: #8b5e3c; }
    .sp-avatar svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.55); }

    .sp-info { display: flex; flex-direction: column; gap: 3px; text-align: left; }
    .sp-top { display: flex; align-items: center; gap: 6px; }
    .sp-stars { display: flex; gap: 2px; align-items: center; }
    .sp-stars svg { width: 12px; height: 12px; }
    .sp-score { font-size: 0.78rem; font-weight: 700; color: var(--white); letter-spacing: -0.01em; }
    .sp-copy { font-size: 0.72rem; font-weight: 400; color: rgba(255,255,255,0.80); white-space: nowrap; }

    /* ── HEADLINE ── */
    h1 {
      font-weight: 800;
      font-size: clamp(2.4rem, 7vw, 5.4rem);
      line-height: 1.06;
      letter-spacing: -0.03em;
      color: var(--white);
      max-width: 720px;
      text-shadow: 0 2px 32px rgba(0,0,0,0.14);
      animation: fadeUp 0.7s 0.25s ease both;
    }

    .sub {
      margin-top: 16px;
      font-size: clamp(0.85rem, 1.5vw, 0.97rem);
      font-weight: 300;
      line-height: 1.7;
      color: rgba(255,255,255,0.80);
      max-width: 400px;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    /* ── CTAs ── */
    .cta-group {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      animation: fadeUp 0.7s 0.55s ease both;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Base compartida */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      border-radius: var(--btn-radius);
      padding: 17px 36px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.01em;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .cta-btn:hover { transform: translateY(-2px); }

    /* CTA primario — blanco con efecto de profundidad/relieve */
    .cta-primary {
      background:
        /* highlight superior: franja blanca semitransparente arriba */
        linear-gradient(
          180deg,
          rgba(255,255,255,1.00) 0%,
          rgba(245,245,250,0.96) 100%
        );
      color: #12103a;
      /* Sombra exterior profunda + sombra interior highlight */
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.90) inset,        /* highlight top */
        0 -1px 0 0 rgba(0,0,0,0.08) inset,             /* sombra bottom */
        0 4px 6px -1px rgba(0,0,0,0.22),               /* sombra base */
        0 10px 24px -4px rgba(80,40,160,0.28),         /* halo coloreado */
        0 0 0 1px rgba(255,255,255,0.20);              /* borde sutil */
    }
    .cta-primary:hover {
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.90) inset,
        0 -1px 0 0 rgba(0,0,0,0.08) inset,
        0 8px 12px -2px rgba(0,0,0,0.24),
        0 18px 36px -6px rgba(80,40,160,0.35),
        0 0 0 1px rgba(255,255,255,0.20);
    }

    /* CTA secundario — glass transparente (estilo trabajado estos días) */
    .cta-secondary {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.30);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.18) inset,
        0 4px 16px rgba(0,0,0,0.12);
    }
    .cta-secondary:hover {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.45);
      box-shadow:
        0 1px 0 0 rgba(255,255,255,0.25) inset,
        0 8px 24px rgba(0,0,0,0.16);
    }

    /* ── ANIMACIONES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 18px 20px; position: relative; }
      .nav-cta { display: none; }
      .nav-hamburger { display: flex; }
      .nav-menu { display: block; }

      .hero { height: 85svh; min-height: 520px; }

      .social-proof {
        max-width: min(300px, calc(100vw - 48px));
        padding: 8px 12px 8px 8px;
        gap: 10px;
        margin-bottom: 22px;
      }
      .sp-avatar { width: 28px; height: 28px; margin-left: -10px; }
      .sp-avatar svg { width: 18px; height: 18px; }
      .sp-copy { font-size: 0.68rem; }
      .sp-score { font-size: 0.74rem; }
      .sp-stars svg { width: 11px; height: 11px; }

      .cta-group { flex-direction: column; align-items: center; gap: 10px; margin-top: 26px; }
      .cta-btn { width: 100%; max-width: 280px; padding: 14px 24px; }
    }
  </style>
</head>
<body>

<section class="hero">
  <canvas id="gradient-canvas"></canvas>
  <div class="grain"></div>

  <!-- NAV -->
  <nav>
    <a href="/"><div class="nav-logo"><img src="./assets/aripa-logo.png" alt="Aripa" /></div></a>

    <button class="nav-cta"
      data-cal-link="javier-rodriguez-de-la-orden/aripa"
      data-cal-namespace="aripa"
      data-cal-config='{"layout":"month_view"}'
    >Hablemos</button>

    <button class="nav-hamburger" id="hamburger" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-menu" id="nav-menu">
      <a href="#servicios">Servicios</a>
      <a href="#casos">Casos de éxito</a>
      <a href="#proceso">Proceso</a>
      <div class="menu-divider"></div>
      <button class="menu-cta"
        data-cal-link="javier-rodriguez-de-la-orden/aripa"
        data-cal-namespace="aripa"
        data-cal-config='{"layout":"month_view"}'
      >Hablemos →</button>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="hero-content">

    <!-- Social proof -->
    <div class="social-proof">
      <div class="sp-avatars">
        <div class="sp-avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M2 21c0-5.5 4.5-9 10-9s10 3.5 10 9"/></svg></div>
        <div class="sp-avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M2 21c0-5.5 4.5-9 10-9s10 3.5 10 9"/></svg></div>
        <div class="sp-avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M2 21c0-5.5 4.5-9 10-9s10 3.5 10 9"/></svg></div>
        <div class="sp-avatar"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M2 21c0-5.5 4.5-9 10-9s10 3.5 10 9"/></svg></div>
      </div>
      <div class="sp-info">
        <div class="sp-top">
          <div class="sp-stars">
            <svg viewBox="0 0 24 24" fill="#FBBF24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg viewBox="0 0 24 24" fill="#FBBF24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg viewBox="0 0 24 24" fill="#FBBF24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg viewBox="0 0 24 24" fill="#FBBF24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <svg viewBox="0 0 24 24"><defs><linearGradient id="half"><stop offset="50%" stop-color="#FBBF24"/><stop offset="50%" stop-color="rgba(255,255,255,0.25)"/></linearGradient></defs><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="url(#half)"/></svg>
          </div>
          <span class="sp-score">4.9/5</span>
        </div>
        <span class="sp-copy">+50 empresas impulsadas</span>
      </div>
    </div>

    <h1>Crece más.<br>Convierte mejor.</h1>

    <p class="sub">
      Consultoría estratégica de crecimiento digital.<br>
      GEO/AEO, CRO avanzado y Behavioral Economics.
    </p>

    <!-- Dos CTAs -->
    <div class="cta-group">
      <button class="cta-btn cta-primary"
        data-cal-link="javier-rodriguez-de-la-orden/aripa"
        data-cal-namespace="aripa"
        data-cal-config='{"layout":"month_view"}'
      >
        Hablemos
      </button>

      <a class="cta-btn cta-secondary" href="#servicios">
        Ver servicios
      </a>
    </div>

  </div>
</section>

<script>
  /* ── Hamburguesa ── */
  const hamburger = document.getElementById('hamburger');
  const navMenu   = document.getElementById('nav-menu');

  hamburger.addEventListener('click', () => {
    const open = navMenu.classList.toggle('open');
    hamburger.classList.toggle('open', open);
  });
  document.addEventListener('click', (e) => {
    if (!hamburger.contains(e.target) && !navMenu.contains(e.target)) {
      navMenu.classList.remove('open');
      hamburger.classList.remove('open');
    }
  });
  navMenu.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('click', () => {
      navMenu.classList.remove('open');
      hamburger.classList.remove('open');
    });
  });

  /* ── Gradiente orgánico ── */
  const canvas = document.getElementById('gradient-canvas');
  const ctx    = canvas.getContext('2d');

  const ORBS = [
    { color: [26,  42, 108], r: 1.08, ax: 0.31, ay: 0.23, px: 0.10, py: 0.15, speed: 0.00000375 },
    { color: [90,  50, 160], r: 1.02, ax: 0.28, ay: 0.35, px: 0.55, py: 0.20, speed: 0.00000275 },
    { color: [160, 80, 180], r: 0.98, ax: 0.22, ay: 0.40, px: 0.80, py: 0.60, speed: 0.00000225 },
    { color: [210, 80, 150], r: 0.94, ax: 0.38, ay: 0.26, px: 0.40, py: 0.75, speed: 0.00000325 },
    { color: [240,100, 140], r: 0.90, ax: 0.44, ay: 0.32, px: 0.70, py: 0.30, speed: 0.00000250 },
    { color: [100, 60, 200], r: 0.86, ax: 0.18, ay: 0.48, px: 0.20, py: 0.80, speed: 0.00000190 },
  ];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function orbPos(orb, t) {
    return {
      x: Math.max(0, Math.min(1, orb.px + orb.ax * Math.sin(t * orb.speed * 1000 + orb.color[0]))) * canvas.width,
      y: Math.max(0, Math.min(1, orb.py + orb.ay * Math.cos(t * orb.speed * 700  + orb.color[2]))) * canvas.height,
    };
  }

  function draw(ts) {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#0e1240';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'screen';
    for (const orb of ORBS) {
      const p = orbPos(orb, ts);
      const r = orb.r * Math.max(W, H);
      const [cr, cg, cb] = orb.color;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
      g.addColorStop(0,   `rgba(${cr},${cg},${cb},0.39)`);
      g.addColorStop(0.4, `rgba(${cr},${cg},${cb},0.15)`);
      g.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
</script>

</body>
</html>
